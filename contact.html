<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Info - Britani R's Beauty Care Assessment</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #fff5f8;
            color: #333;
        }

        header {
            background-color: #cf6f97;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            color: #fff;
        }

        .contact-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .contact-info {
            margin-bottom: 30px;
        }

        .contact-info p {
            margin: 10px 0;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input,
        textarea {
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            background-color: #f8c8dc;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #cf6f97;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            background-color: #cf6f97;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>Britani R's Beauty Care Questionnaire</h1>
    </header>

    <section class="contact-container">
        <div class="contact-info">
            <h2>Contact Information</h2>
            <p><strong>Email:</strong> ascendingempress24@yahoo.com</p>
            <p><strong>TikTok:</strong> ascendingempress35</p>
            <p><strong>Twitter/X:</strong> lusciousb21</p>
        </div>

        <form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST">

    <input type="hidden" name="_captcha" value="false">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>

</form>
    </section>

    <footer>
        <p>&copy; 2026 Britani R's Beauty Care. All Rights Reserved.</p>
    </footer>

</body>
</html>
